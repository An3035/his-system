version: "3.8"

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: his_mysql
    restart: always
    ports:
      - "3306:3306"   # 容器3306 映射到 本机3306
    environment:
      MYSQL_ROOT_PASSWORD: 123456  # 改成你自己的密码
      MYSQL_DATABASE: his_db
      MYSQL_CHARSET: utf8mb4
    volumes:
      - mysql_data:/var/lib/mysql  # 数据持久化，容器删除数据不丢
    networks:
      his_net:

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: his_redis
    restart: always
    ports:
      - "6379:6379"  # 容器6379 映射到 本机6379
    volumes:
      - redis_data:/data
    networks:
      his_net:

  # Qdrant 向量数据库
  qdrant:
    image: qdrant/qdrant
    container_name: his_qdrant
    restart: always
    ports:
      - "6333:6333"  # 容器6333 映射到 本机6333
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      his_net:

# 数据卷（持久化数据）
volumes:
  mysql_data:
  redis_data:
  qdrant_data:

# 自定义网络
networks:
  his_net:
    driver: bridge
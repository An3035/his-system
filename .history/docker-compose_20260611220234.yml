version: "3.8"

services:
  his-mysql:
    image: mysql:8.0   # 👉 这里就只写 image: mysql:8.0，后面绝对不能加任何命令/文字
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: his_db
      MYSQL_USER: his_user
      MYSQL_PASSWORD: 123456
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  his-redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  his-qdrant:
    image: qdrant/qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # 你原来正常能用的主服务 his-system 保留
  his-system:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - his-mysql
      - his-redis
      - his-qdrant
    environment:
      DB_HOST: his-mysql
      DB_PORT: 3306
      DB_NAME: his_db
      DB_USER: his_user
      DB_PASSWORD: 123456
      REDIS_URL: redis://his-redis:6379
      QDRANT_URL: http://his-qdrant:6333

volumes:
  mysql_data:
  qdrant_data: